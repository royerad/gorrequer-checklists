<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travaux — Gorrequer</title>
  <style>
    :root {
      --bg: #f6f4f1; --card: #fff; --text: #1c1c1c; --muted: #666;
      --line: #e4e0da; --priority: #8a3b2c; --ok: #2f5d50;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 520px; margin: 0 auto; padding: 1rem;
      background: var(--bg); color: var(--text);
    }
    h1 { margin: 0 0 0.35rem; font-size: 1.5rem; }
    .subtitle { margin: 0 0 1rem; color: var(--muted); font-size: 0.95rem; }
    .top { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.7rem 0.9rem; border-radius: 10px; border: 1px solid var(--line);
      background: var(--card); color: var(--text); font-size: 0.95rem; cursor: pointer;
    }
    .btn-primary { background: var(--ok); border-color: var(--ok); color: #fff; flex: 1; font-weight: 600; }
    .btn-danger { border-color: #e7b3a6; color: var(--priority); }
    .btn-small { padding: 0.45rem 0.65rem; font-size: 0.85rem; }
    .filters { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
    .chip {
      border: 1px solid var(--line); background: var(--card); border-radius: 999px;
      padding: 0.35rem 0.7rem; font-size: 0.85rem; cursor: pointer;
    }
    .chip.active { background: #e8efeC; border-color: #b7cfc6; color: var(--ok); font-weight: 600; }
    .status { margin: 0 0 0.75rem; color: var(--muted); font-size: 0.9rem; }
    details.item, .panel {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; margin: 0.55rem 0; overflow: hidden;
    }
    details.item.prio { border-left: 4px solid var(--priority); }
    .panel { padding: 0.85rem; }
    summary {
      list-style: none; display: grid; grid-template-columns: 1fr auto;
      gap: 0.35rem 0.75rem; padding: 0.85rem 0.95rem; cursor: pointer;
    }
    summary::-webkit-details-marker { display: none; }
    .title { font-weight: 700; line-height: 1.3; }
    .meta { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
    .tag {
      display: inline-block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.03em; padding: 0.15rem 0.45rem; border-radius: 999px; background: #eee;
    }
    .tag.todo { background: #f3e4e0; color: var(--priority); }
    .tag.doing { background: #fff3d6; color: #8a6a14; }
    .tag.done { background: #e5f0eb; color: var(--ok); }
    .tag.prio { background: #f3e4e0; color: var(--priority); }
    .date { font-size: 0.85rem; color: var(--muted); }
    .chevron { color: var(--muted); transition: transform .15s ease; }
    details[open] .chevron { transform: rotate(90deg); }
    .content { padding: 0.75rem 0.95rem 1rem; border-top: 1px solid var(--line); }
    .field { margin: 0.65rem 0; }
    .field label {
      display: block; font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--muted); margin-bottom: 0.25rem;
    }
    .field p { margin: 0; white-space: pre-wrap; }
    .field .hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.25rem; }
    input, select, textarea {
      width: 100%; padding: 0.55rem 0.65rem; border: 1px solid var(--line);
      border-radius: 8px; font: inherit; background: #fff;
    }
    textarea { min-height: 90px; }
    .price-row { display: flex; gap: 0.5rem; }
    .price-row input { flex: 2; min-width: 0; }
    .price-row select { flex: 1; min-width: 0; }
    .photos { display: grid; gap: 0.5rem; }
    .photo-wrap { position: relative; }
    .photos img { width: 100%; border-radius: 8px; display: block; background: #eee; }
    .photo-del {
      position: absolute; top: 0.4rem; right: 0.4rem; border: none; border-radius: 999px;
      background: rgba(0,0,0,.65); color: #fff; width: 2rem; height: 2rem; cursor: pointer;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem; }
    .empty, .error {
      background: var(--card); border: 1px dashed var(--line); border-radius: 12px;
      padding: 1rem; text-align: center; color: var(--muted);
    }
    .error { color: var(--priority); border-color: #e7b3a6; }
    .add-frame { width: 100%; height: 740px; border: 0; border-radius: 8px; background: #fff; }
    .add-head { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h1>Travaux</h1>
  <p class="subtitle">À faire, en cours ou terminés</p>

  <div class="top">
    <button class="btn btn-primary" type="button" id="btn-add">+ Ajouter un travail</button>
    <button class="btn" type="button" id="btn-refresh">Rafraîchir</button>
  </div>

  <div class="panel" id="add-panel" hidden>
    <div class="add-head">
      <strong>Nouveau travail</strong>
      <button class="btn btn-small" type="button" id="btn-close-add">Fermer / rafraîchir</button>
    </div>
    <iframe class="add-frame" id="add-frame" title="Ajout travail" src="about:blank"></iframe>
  </div>

  <div class="filters" id="filters">
    <button class="chip active" data-filter="tous" type="button">Tous</button>
    <button class="chip" data-filter="À faire" type="button">À faire</button>
    <button class="chip" data-filter="En cours" type="button">En cours</button>
    <button class="chip" data-filter="Terminé" type="button">Terminé</button>
  </div>

  <p class="status" id="status">Chargement…</p>
  <div id="list"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxd45Ga2elfOcf3WJ3lfoKkAMRlAWaTXs1FWmU0OLCxVktwTX8UdvRSIzLSN0d_Doa2/exec";
    const ADD_UI_URL = API_URL + "?ui=add";

    const listEl = document.getElementById("list");
    const statusEl = document.getElementById("status");
    const addPanel = document.getElementById("add-panel");
    const addFrame = document.getElementById("add-frame");

    let allItems = [];
    let currentFilter = "tous";
    let editingId = null;
    let addPollTimer = null;

    function startAddPolling() {
      stopAddPolling();
      addPollTimer = setInterval(loadTravaux, 5000);
    }

    function stopAddPolling() {
      if (addPollTimer) {
        clearInterval(addPollTimer);
        addPollTimer = null;
      }
    }

    function closeAddPanel() {
      addPanel.hidden = true;
      addFrame.src = "about:blank";
      stopAddPolling();
    }

    function askPassword(msg) {
      const v = prompt(msg);
      if (v === null) return null;
      const t = v.trim();
      if (!t) { alert("Mot de passe vide"); return null; }
      return t;
    }

    function apiGet(params) {
      return new Promise((resolve, reject) => {
        const cb = "__cb_" + Date.now();
        const script = document.createElement("script");
        window[cb] = (data) => { resolve(data); delete window[cb]; script.remove(); };
        const q = new URLSearchParams(params);
        q.set("callback", cb);
        script.src = API_URL + "?" + q.toString();
        script.onerror = () => reject(new Error("API"));
        document.body.appendChild(script);
      });
    }

    function formatDate(value) {
      if (!value) return "—";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" });
    }

    function isPriority(value) {
      const v = String(value || "").toLowerCase();
      return ["oui", "urgent", "yes", "true", "1"].includes(v);
    }

    function statusClass(statut) {
      const s = String(statut || "").toLowerCase();
      if (s.includes("cours")) return "doing";
      if (s.includes("termin")) return "done";
      return "todo";
    }

    function driveId(url) {
      const s = String(url);
      return (s.match(/\/d\/([^/]+)/) || [])[1] || (s.match(/[?&]id=([^&]+)/) || [])[1] || null;
    }

    function imgUrl(url) {
      const id = driveId(url);
      return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1200" : url;
    }

    function parsePhotos(value) {
      if (!value) return [];
      return String(value).split(/[\s,;]+/).map((x) => x.trim()).filter((x) => /^https?:\/\//i.test(x));
    }

    function normalize(row) {
      const original = parsePhotos(row.photos || "");
      return {
        id: row.id || row.horodatage,
        titre: row.titre || "",
        statut: row.statut || "À faire",
        prioritaire: isPriority(row.prioritaire),
        date: row.horodatage || "",
        notes: row.notes || "",
        tarif: row.tarif || "",
        personnes: row.personnes || "",
        photosOriginal: original,
        photos: original.map(imgUrl),
      };
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function parseTarif(value) {
      if (!value) return { amount: "", currency: "EUR" };
      const s = String(value).trim();
      const m = s.match(/^([\d\s.,]+)\s*(EUR|USD|CHF|€|\$)?$/i);
      if (m) {
        let cur = (m[2] || "EUR").toUpperCase();
        if (cur === "€") cur = "EUR";
        if (cur === "$") cur = "USD";
        return { amount: m[1].replace(/\s/g, "").replace(",", "."), currency: cur };
      }
      return { amount: "", currency: "EUR", legacy: s };
    }

    function buildTarifFromForm() {
      const raw = document.getElementById("f-tarif").value.trim();
      if (!raw) return "";
      const n = parseFloat(raw.replace(",", "."));
      if (isNaN(n) || n < 0) return null;
      const cur = document.getElementById("f-devise").value;
      const amount = (Math.round(n * 100) / 100).toString().replace(".", ",");
      return amount + " " + cur;
    }

    function formatTarifDisplay(value) {
      if (!value) return "—";
      const m = String(value).trim().match(/^([\d.,]+)\s*(EUR|USD|CHF)$/i);
      if (!m) return value;
      const sym = { EUR: "€", USD: "$", CHF: "CHF" }[m[2].toUpperCase()] || m[2];
      return m[1] + " " + sym;
    }

    function formFields(item) {
      const t = parseTarif(item.tarif);
      return `
        <div class="field"><label>Titre</label><input id="f-titre" value="${escapeHtml(item.titre)}" /></div>
        <div class="field"><label>Statut</label>
          <select id="f-statut">
            <option ${item.statut === "À faire" ? "selected" : ""}>À faire</option>
            <option ${item.statut === "En cours" ? "selected" : ""}>En cours</option>
            <option ${item.statut === "Terminé" ? "selected" : ""}>Terminé</option>
          </select>
        </div>
        <div class="field"><label>Priorité</label>
          <select id="f-prio">
            <option value="Non" ${!item.prioritaire ? "selected" : ""}>Non</option>
            <option value="Urgent" ${item.prioritaire ? "selected" : ""}>Urgent</option>
          </select>
        </div>
        <div class="field"><label>Notes</label><textarea id="f-notes">${escapeHtml(item.notes || "")}</textarea></div>
        <div class="field"><label>Tarif</label>
          <div class="price-row">
            <input id="f-tarif" type="number" inputmode="decimal" min="0" step="0.01"
              value="${escapeHtml(t.amount)}" placeholder="0" />
            <select id="f-devise">
              <option value="EUR" ${t.currency === "EUR" ? "selected" : ""}>€ EUR</option>
              <option value="USD" ${t.currency === "USD" ? "selected" : ""}>$ USD</option>
              <option value="CHF" ${t.currency === "CHF" ? "selected" : ""}>CHF</option>
            </select>
          </div>
          ${t.legacy ? `<p class="hint">Ancien format : ${escapeHtml(t.legacy)}</p>` : ""}
        </div>
        <div class="field"><label>Responsable</label><input id="f-pers" value="${escapeHtml(item.personnes || "")}" /></div>
      `;
    }

    function render() {
      const items = allItems.filter((item) => {
        if (currentFilter === "tous") return true;
        return String(item.statut).toLowerCase() === currentFilter.toLowerCase();
      });

      statusEl.textContent = items.length
        ? items.length + (items.length > 1 ? " travaux" : " travail")
        : "Aucun travail";

      if (!items.length) {
        listEl.innerHTML = '<div class="empty">Aucun travail pour le moment.</div>';
        return;
      }

      listEl.innerHTML = items.map((item) => {
        if (editingId === item.id) {
          return `<details class="item ${item.prioritaire ? "prio" : ""}" open>
            <summary><div class="title">Modification</div><span class="chevron">›</span></summary>
            <div class="content">
              ${formFields(item)}
              <div class="actions">
                <button class="btn btn-primary btn-small" type="button" data-save="${escapeHtml(item.id)}">Enregistrer</button>
                <button class="btn btn-small" type="button" data-cancel>Annuler</button>
              </div>
            </div>
          </details>`;
        }

        const photosHtml = item.photos.length
          ? `<div class="field"><label>Photos</label><div class="photos">${item.photos.map((src, i) => `
              <div class="photo-wrap">
                <img src="${src}" alt="Photo" loading="lazy" />
                <button class="photo-del" type="button"
                  data-del-photo="${escapeHtml(item.id)}"
                  data-photo-url="${escapeHtml(item.photosOriginal[i])}">×</button>
              </div>`).join("")}</div></div>`
          : `<div class="field"><label>Photos</label><p>—</p></div>`;

        return `<details class="item ${item.prioritaire ? "prio" : ""}">
          <summary>
            <div class="title">${escapeHtml(item.titre)}</div>
            <span class="chevron">›</span>
            <div class="meta">
              <span class="tag ${statusClass(item.statut)}">${escapeHtml(item.statut)}</span>
              ${item.prioritaire ? '<span class="tag prio">Urgent</span>' : ""}
              <span class="date">${escapeHtml(formatDate(item.date))}</span>
            </div>
          </summary>
          <div class="content">
            <div class="field"><label>Notes</label><p>${escapeHtml(item.notes || "—")}</p></div>
            <div class="field"><label>Tarif</label><p>${escapeHtml(formatTarifDisplay(item.tarif))}</p></div>
            <div class="field"><label>Responsable</label><p>${escapeHtml(item.personnes || "—")}</p></div>
            ${photosHtml}
            <div class="actions">
              <button class="btn btn-small" type="button" data-edit="${escapeHtml(item.id)}">Modifier</button>
              <button class="btn btn-small btn-danger" type="button" data-delete="${escapeHtml(item.id)}">Supprimer</button>
            </div>
          </div>
        </details>`;
      }).join("");
    }

    async function loadTravaux() {
      if (!addPanel.hidden) {
        statusEl.textContent = "Synchronisation…";
      } else {
        statusEl.textContent = "Chargement…";
      }
      try {
        const data = await apiGet({ action: "list" });
        allItems = (Array.isArray(data) ? data : []).map(normalize);
        editingId = null;
        render();
      } catch (e) {
        statusEl.textContent = "Erreur";
        listEl.innerHTML = '<div class="error">Impossible de charger les travaux.</div>';
      }
    }

    document.getElementById("btn-add").onclick = () => {
      addFrame.src = ADD_UI_URL;
      addPanel.hidden = false;
      startAddPolling();
      addPanel.scrollIntoView({ behavior: "smooth", block: "start" });
    };

    document.getElementById("btn-close-add").onclick = () => {
      closeAddPanel();
      loadTravaux();
    };

    document.getElementById("btn-refresh").onclick = loadTravaux;

    document.getElementById("filters").addEventListener("click", (e) => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
      btn.classList.add("active");
      render();
    });

    listEl.addEventListener("click", async (e) => {
      if (e.target.closest("[data-cancel]")) { editingId = null; render(); return; }

      const editBtn = e.target.closest("[data-edit]");
      if (editBtn) { editingId = editBtn.getAttribute("data-edit"); render(); return; }

      const saveBtn = e.target.closest("[data-save]");
      if (saveBtn) {
        const pin = askPassword("Mot de passe pour enregistrer :");
        if (!pin) return;
        const tarif = buildTarifFromForm();
        if (tarif === null) return alert("Tarif invalide : chiffres uniquement");
        const res = await apiGet({
          action: "update",
          token: pin,
          id: saveBtn.getAttribute("data-save"),
          titre: document.getElementById("f-titre").value,
          statut: document.getElementById("f-statut").value,
          prioritaire: document.getElementById("f-prio").value,
          notes: document.getElementById("f-notes").value,
          tarif: tarif,
          personnes: document.getElementById("f-pers").value,
        });
        if (!res || !res.ok) return alert((res && res.error) || "Erreur");
        await loadTravaux();
        return;
      }

      const delBtn = e.target.closest("[data-delete]");
      if (delBtn) {
        const pin = askPassword("Mot de passe pour supprimer :");
        if (!pin) return;
        if (!confirm("Supprimer ce travail ?")) return;
        const res = await apiGet({
          action: "delete",
          token: pin,
          id: delBtn.getAttribute("data-delete"),
        });
        if (!res || !res.ok) return alert((res && res.error) || "Erreur");
        await loadTravaux();
        return;
      }

      const photoBtn = e.target.closest("[data-del-photo]");
      if (photoBtn) {
        const pin = askPassword("Mot de passe pour retirer la photo :");
        if (!pin) return;
        if (!confirm("Retirer cette photo ?")) return;
        const res = await apiGet({
          action: "removePhoto",
          token: pin,
          id: photoBtn.getAttribute("data-del-photo"),
          photoUrl: photoBtn.getAttribute("data-photo-url"),
        });
        if (!res || !res.ok) return alert((res && res.error) || "Erreur");
        await loadTravaux();
      }
    });

    window.addEventListener("message", function (event) {
      if (!event.data || event.data.type !== "travaux-added" || !event.data.ok) return;
      closeAddPanel();
      loadTravaux();
    });

    loadTravaux();
  </script>
</body>
</html>
