<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travaux — Gorrequer</title>
  <style>
    :root {
      --bg: #f6f4f1;
      --card: #fff;
      --text: #1c1c1c;
      --muted: #666;
      --line: #e4e0da;
      --priority: #8a3b2c;
      --ok: #2f5d50;
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 520px;
      margin: 0 auto;
      padding: 1rem;
      background: var(--bg);
      color: var(--text);
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
    }

    .subtitle {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .top {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
      text-decoration: none;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--ok);
      border-color: var(--ok);
      color: #fff;
      flex: 1;
      font-weight: 600;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 999px;
      padding: 0.35rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .chip.active {
      background: #e8efeC;
      border-color: #b7cfc6;
      color: var(--ok);
      font-weight: 600;
    }

    .status {
      margin: 0 0 0.75rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    details.item {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      margin: 0.55rem 0;
      overflow: hidden;
    }

    details.item.prio {
      border-left: 4px solid var(--priority);
    }

    summary {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.35rem 0.75rem;
      padding: 0.85rem 0.95rem;
      cursor: pointer;
      user-select: none;
    }

    summary::-webkit-details-marker { display: none; }

    .title {
      font-weight: 700;
      line-height: 1.3;
    }

    .meta {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
    }

    .tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      background: #eee;
      color: #444;
    }

    .tag.todo { background: #f3e4e0; color: var(--priority); }
    .tag.doing { background: #fff3d6; color: #8a6a14; }
    .tag.done { background: #e5f0eb; color: var(--ok); }
    .tag.prio { background: #f3e4e0; color: var(--priority); }

    .date {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .chevron {
      color: var(--muted);
      transition: transform 0.15s ease;
      align-self: start;
    }

    details[open] .chevron { transform: rotate(90deg); }

    .content {
      padding: 0.75rem 0.95rem 1rem;
      border-top: 1px solid var(--line);
    }

    .field {
      margin: 0.65rem 0;
    }

    .field label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .field p {
      margin: 0;
      font-size: 0.98rem;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .photos {
      display: grid;
      gap: 0.5rem;
      margin-top: 0.35rem;
    }

    .photos img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
      background: #eee;
    }

    .empty, .error {
      background: var(--card);
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 1rem;
      color: var(--muted);
      text-align: center;
    }

    .error { border-color: #e7b3a6; color: var(--priority); }
  </style>
</head>
<body>
  <h1>Travaux</h1>
  <p class="subtitle">Suivi des travaux à faire, en cours ou terminés</p>

  <div class="top">
    <a class="btn btn-primary" id="btn-add" target="_blank" rel="noopener">
      + Ajouter un travail
    </a>
    <button class="btn" type="button" id="btn-refresh">Rafraîchir</button>
  </div>

  <div class="filters" id="filters">
    <button class="chip active" data-filter="tous" type="button">Tous</button>
    <button class="chip" data-filter="À faire" type="button">À faire</button>
    <button class="chip" data-filter="En cours" type="button">En cours</button>
    <button class="chip" data-filter="Terminé" type="button">Terminé</button>
  </div>

  <p class="status" id="status">Chargement…</p>
  <div id="list"></div>

  <script>
    // ========== À COMPLÉTER ==========
    const API_URL = "https://script.google.com/macros/s/AKfycbxd45Ga2elfOcf3WJ3lfoKkAMRlAWaTXs1FWmU0OLCxVktwTX8UdvRSIzLSN0d_Doa2/exec";
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdxioUmnwt7ddwgv5pkLyb3HpkCAzf4WhoIR-RktOOsO8rFsw/viewform";
    // ================================

    const listEl = document.getElementById("list");
    const statusEl = document.getElementById("status");
    const btnAdd = document.getElementById("btn-add");
    const btnRefresh = document.getElementById("btn-refresh");

    btnAdd.href = FORM_URL;

    let allItems = [];
    let currentFilter = "tous";

    function pick(row, names) {
      const keys = Object.keys(row);
      for (const name of names) {
        const found = keys.find((k) => k.toLowerCase().includes(name.toLowerCase()));
        if (found && row[found] !== "" && row[found] != null) return row[found];
      }
      return "";
    }

    function formatDate(value) {
      if (!value) return "—";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleDateString("fr-FR", {
        day: "2-digit",
        month: "short",
        year: "numeric",
      });
    }

    function isPriority(value) {
      const v = String(value || "").toLowerCase();
      return v === "oui" || v === "yes" || v === "true" || v === "1";
    }

    function statusClass(statut) {
      const s = String(statut || "").toLowerCase();
      if (s.includes("cours")) return "doing";
      if (s.includes("termin")) return "done";
      return "todo";
    }

    function extractDriveId(url) {
      const s = String(url);
      return (
        (s.match(/\/d\/([^/]+)/) || [])[1] ||
        (s.match(/[?&]id=([^&]+)/) || [])[1] ||
        null
      );
    }

    function toImageUrl(url) {
      const id = extractDriveId(url);
      if (id) return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1200";
      return url;
    }

    function parsePhotos(value) {
      if (!value) return [];
      return String(value)
        .split(/[\s,;]+/)
        .map((x) => x.trim())
        .filter((x) => /^https?:\/\//i.test(x))
        .map(toImageUrl);
    }

    function normalize(row) {
      return {
        titre: pick(row, ["titre", "title", "nom"]),
        statut: pick(row, ["statut", "status", "état", "etat"]) || "À faire",
        prioritaire: isPriority(pick(row, ["prioritaire", "priority", "prio"])),
        date: pick(row, ["horodatage", "timestamp", "date"]),
        notes: pick(row, ["notes", "note", "description", "détail", "detail"]),
        tarif: pick(row, ["tarif", "prix", "budget", "coût", "cout"]),
        personnes: pick(row, ["personnes", "personne", "responsable", "assign"]),
        photos: parsePhotos(pick(row, ["photos", "photo", "image", "fichier", "file"])),
      };
    }

    function render() {
      const items = allItems.filter((item) => {
        if (currentFilter === "tous") return true;
        return String(item.statut).toLowerCase() === currentFilter.toLowerCase();
      });

      statusEl.textContent = items.length
        ? items.length + " travail" + (items.length > 1 ? "x" : "")
        : "Aucun travail pour ce filtre";

      if (!items.length) {
        listEl.innerHTML = '<div class="empty">Aucun travail pour le moment.<br>Cliquez sur « Ajouter un travail ».</div>';
        return;
      }

      listEl.innerHTML = items
        .map((item) => {
          const photosHtml = item.photos.length
            ? `<div class="field"><label>Photos</label><div class="photos">${item.photos
                .map((src) => `<img src="${src}" alt="Photo du travail" loading="lazy" />`)
                .join("")}</div></div>`
            : `<div class="field"><label>Photos</label><p>—</p></div>`;

          return `
            <details class="item ${item.prioritaire ? "prio" : ""}">
              <summary>
                <div class="title">${escapeHtml(item.titre)}</div>
                <span class="chevron">›</span>
                <div class="meta">
                  <span class="tag ${statusClass(item.statut)}">${escapeHtml(item.statut)}</span>
                  ${item.prioritaire ? '<span class="tag prio">Prioritaire</span>' : ""}
                  <span class="date">${escapeHtml(formatDate(item.date))}</span>
                </div>
              </summary>
              <div class="content">
                <div class="field"><label>Notes</label><p>${escapeHtml(item.notes || "—")}</p></div>
                <div class="field"><label>Tarif</label><p>${escapeHtml(item.tarif || "—")}</p></div>
                <div class="field"><label>Personne(s)</label><p>${escapeHtml(item.personnes || "—")}</p></div>
                ${photosHtml}
              </div>
            </details>
          `;
        })
        .join("");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function loadTravaux() {
      statusEl.textContent = "Chargement…";
      listEl.innerHTML = "";

      window.__travauxCallback = function (data) {
        try {
          allItems = (Array.isArray(data) ? data : []).map(normalize);
          render();
        } catch (err) {
          statusEl.textContent = "Erreur d’affichage";
          listEl.innerHTML = '<div class="error">Impossible d’afficher les travaux.</div>';
        }
        delete window.__travauxCallback;
      };

      const script = document.createElement("script");
      script.src = API_URL + (API_URL.includes("?") ? "&" : "?") + "callback=__travauxCallback";
      script.onerror = function () {
        statusEl.textContent = "Erreur de chargement";
        listEl.innerHTML =
          '<div class="error">L’API ne répond pas. Vérifiez l’URL /exec et le déploiement Apps Script (accès : Tous).</div>';
      };
      document.body.appendChild(script);
    }

    document.getElementById("filters").addEventListener("click", (e) => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
      btn.classList.add("active");
      render();
    });

    btnRefresh.addEventListener("click", loadTravaux);
    loadTravaux();
  </script>
</body>
</html>
