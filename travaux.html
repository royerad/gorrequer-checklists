<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travaux — Gorrequer</title>
  <style>
    :root {
      --bg: #f6f4f1;
      --card: #fff;
      --text: #1c1c1c;
      --muted: #666;
      --line: #e4e0da;
      --priority: #8a3b2c;
      --ok: #2f5d50;
      --danger: #8a3b2c;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 520px;
      margin: 0 auto;
      padding: 1rem;
      background: var(--bg);
      color: var(--text);
    }
    h1 { margin: 0 0 0.35rem; font-size: 1.5rem; }
    .subtitle { margin: 0 0 1rem; color: var(--muted); font-size: 0.95rem; }
    .top { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.7rem 0.9rem; border-radius: 10px; border: 1px solid var(--line);
      background: var(--card); color: var(--text); font-size: 0.95rem;
      text-decoration: none; cursor: pointer;
    }
    .btn-primary { background: var(--ok); border-color: var(--ok); color: #fff; flex: 1; font-weight: 600; }
    .btn-danger { background: #fff; border-color: #e7b3a6; color: var(--danger); }
    .btn-small { padding: 0.45rem 0.65rem; font-size: 0.85rem; }
    .filters { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
    .chip {
      border: 1px solid var(--line); background: var(--card); border-radius: 999px;
      padding: 0.35rem 0.7rem; font-size: 0.85rem; cursor: pointer;
    }
    .chip.active { background: #e8efeC; border-color: #b7cfc6; color: var(--ok); font-weight: 600; }
    .status { margin: 0 0 0.75rem; color: var(--muted); font-size: 0.9rem; }
    details.item {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; margin: 0.55rem 0; overflow: hidden;
    }
    details.item.prio { border-left: 4px solid var(--priority); }
    summary {
      list-style: none; display: grid; grid-template-columns: 1fr auto;
      gap: 0.35rem 0.75rem; padding: 0.85rem 0.95rem; cursor: pointer;
    }
    summary::-webkit-details-marker { display: none; }
    .title { font-weight: 700; line-height: 1.3; }
    .meta { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
    .tag {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.03em;
      padding: 0.15rem 0.45rem; border-radius: 999px; background: #eee; color: #444;
    }
    .tag.todo { background: #f3e4e0; color: var(--priority); }
    .tag.doing { background: #fff3d6; color: #8a6a14; }
    .tag.done { background: #e5f0eb; color: var(--ok); }
    .tag.prio { background: #f3e4e0; color: var(--priority); }
    .date { font-size: 0.85rem; color: var(--muted); }
    .chevron { color: var(--muted); transition: transform 0.15s ease; }
    details[open] .chevron { transform: rotate(90deg); }
    .content { padding: 0.75rem 0.95rem 1rem; border-top: 1px solid var(--line); }
    .field { margin: 0.65rem 0; }
    .field label {
      display: block; font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--muted); margin-bottom: 0.25rem;
    }
    .field p { margin: 0; font-size: 0.98rem; line-height: 1.4; white-space: pre-wrap; }
    input, select, textarea {
      width: 100%; padding: 0.55rem 0.65rem; border: 1px solid var(--line);
      border-radius: 8px; font: inherit; background: #fff;
    }
    textarea { min-height: 90px; resize: vertical; }
    .photos { display: grid; gap: 0.5rem; margin-top: 0.35rem; }
    .photo-wrap { position: relative; }
    .photos img { width: 100%; height: auto; border-radius: 8px; display: block; background: #eee; }
    .photo-del {
      position: absolute; top: 0.4rem; right: 0.4rem;
      border: none; border-radius: 999px; background: rgba(0,0,0,.65);
      color: #fff; width: 2rem; height: 2rem; cursor: pointer; font-size: 1rem;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem; }
    .empty, .error {
      background: var(--card); border: 1px dashed var(--line);
      border-radius: 12px; padding: 1rem; color: var(--muted); text-align: center;
    }
    .error { border-color: #e7b3a6; color: var(--priority); }
    .pin {
      display: flex; gap: 0.4rem; margin-bottom: 0.75rem; align-items: center;
    }
    .pin input { flex: 1; }
  </style>
</head>
<body>
  <h1>Travaux</h1>
  <p class="subtitle">Suivi des travaux — ajout, modification, suppression</p>

  <div class="top">
    <a class="btn btn-primary" id="btn-add" target="_blank" rel="noopener">+ Ajouter un travail</a>
    <button class="btn" type="button" id="btn-refresh">Rafraîchir</button>
  </div>

  <div class="pin">
    <input id="pin" type="password" placeholder="Code modification (PIN)" />
    <button class="btn btn-small" type="button" id="btn-save-pin">OK</button>
  </div>

  <div class="filters" id="filters">
    <button class="chip active" data-filter="tous" type="button">Tous</button>
    <button class="chip" data-filter="À faire" type="button">À faire</button>
    <button class="chip" data-filter="En cours" type="button">En cours</button>
    <button class="chip" data-filter="Terminé" type="button">Terminé</button>
  </div>

  <p class="status" id="status">Chargement…</p>
  <div id="list"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxd45Ga2elfOcf3WJ3lfoKkAMRlAWaTXs1FWmU0OLCxVktwTX8UdvRSIzLSN0d_Doa2/exec?";
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdxioUmnwt7ddwgv5pkLyb3HpkCAzf4WhoIR-RktOOsO8rFsw/viewform";

    const listEl = document.getElementById("list");
    const statusEl = document.getElementById("status");
    document.getElementById("btn-add").href = FORM_URL;

    let allItems = [];
    let currentFilter = "tous";
    let editingId = null;

    const pinInput = document.getElementById("pin");
    pinInput.value = localStorage.getItem("travaux-pin") || "";
    document.getElementById("btn-save-pin").onclick = () => {
      localStorage.setItem("travaux-pin", pinInput.value.trim());
      alert("Code enregistré sur cet appareil");
    };
    function token() {
      return (pinInput.value || localStorage.getItem("travaux-pin") || "").trim();
    }

    function apiJsonp(params) {
      return new Promise((resolve, reject) => {
        const cb = "__cb_" + Date.now() + "_" + Math.floor(Math.random() * 9999);
        window[cb] = (data) => {
          resolve(data);
          delete window[cb];
          script.remove();
        };
        const q = new URLSearchParams(params);
        q.set("callback", cb);
        const script = document.createElement("script");
        script.src = API_URL + "?" + q.toString();
        script.onerror = () => {
          reject(new Error("API"));
          delete window[cb];
        };
        document.body.appendChild(script);
      });
    }

    function formatDate(value) {
      if (!value) return "—";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" });
    }

    function isPriority(value) {
      const v = String(value || "").toLowerCase();
      return ["oui", "urgent", "yes", "true", "1"].includes(v);
    }

    function statusClass(statut) {
      const s = String(statut || "").toLowerCase();
      if (s.includes("cours")) return "doing";
      if (s.includes("termin")) return "done";
      return "todo";
    }

    function extractDriveId(url) {
      const s = String(url);
      return (s.match(/\/d\/([^/]+)/) || [])[1] || (s.match(/[?&]id=([^&]+)/) || [])[1] || null;
    }

    function toImageUrl(url) {
      const id = extractDriveId(url);
      return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1200" : url;
    }

    function parsePhotos(value) {
      if (!value) return [];
      if (Array.isArray(value)) return value.map(toImageUrl);
      return String(value).split(/[\s,;]+/).map((x) => x.trim()).filter((x) => /^https?:\/\//i.test(x));
    }

    function normalize(row) {
      const photosRaw = parsePhotos(row.photos || "");
      return {
        id: row.id || row.horodatage,
        titre: row.titre || "",
        statut: row.statut || "À faire",
        prioritaireRaw: row.prioritaire || "Non",
        prioritaire: isPriority(row.prioritaire),
        date: row.horodatage || "",
        notes: row.notes || "",
        tarif: row.tarif || "",
        personnes: row.personnes || "",
        photos: photosRaw,
        photosOriginal: photosRaw.map((u, i) => parsePhotos(row.photos || "")[i] || u),
      };
    }

    // Conserve les URLs Drive d'origine pour la suppression
    function normalizeBetter(row) {
      const original = parsePhotos(row.photos || "");
      return {
        id: row.id || row.horodatage,
        titre: row.titre || "",
        statut: row.statut || "À faire",
        prioritaireRaw: row.prioritaire || "Non",
        prioritaire: isPriority(row.prioritaire),
        date: row.horodatage || "",
        notes: row.notes || "",
        tarif: row.tarif || "",
        personnes: row.personnes || "",
        photosOriginal: original,
        photos: original.map(toImageUrl),
      };
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function render() {
      const items = allItems.filter((item) => {
        if (currentFilter === "tous") return true;
        return String(item.statut).toLowerCase() === currentFilter.toLowerCase();
      });

      statusEl.textContent = items.length
        ? items.length + " travail" + (items.length > 1 ? "x" : "")
        : "Aucun travail pour ce filtre";

      if (!items.length) {
        listEl.innerHTML = '<div class="empty">Aucun travail.</div>';
        return;
      }

      listEl.innerHTML = items.map((item) => {
        if (editingId === item.id) {
          return `
            <details class="item ${item.prioritaire ? "prio" : ""}" open>
              <summary>
                <div class="title">Modifier — ${escapeHtml(item.titre)}</div>
                <span class="chevron">›</span>
              </summary>
              <div class="content">
                <div class="field"><label>Titre</label><input id="e-titre" value="${escapeHtml(item.titre)}" /></div>
                <div class="field"><label>Statut</label>
                  <select id="e-statut">
                    <option ${item.statut === "À faire" ? "selected" : ""}>À faire</option>
                    <option ${item.statut === "En cours" ? "selected" : ""}>En cours</option>
                    <option ${item.statut === "Terminé" ? "selected" : ""}>Terminé</option>
                  </select>
                </div>
                <div class="field"><label>Priorité</label>
                  <select id="e-prio">
                    <option value="Non" ${!item.prioritaire ? "selected" : ""}>Non</option>
                    <option value="Urgent" ${item.prioritaire ? "selected" : ""}>Urgent</option>
                  </select>
                </div>
                <div class="field"><label>Notes</label><textarea id="e-notes">${escapeHtml(item.notes)}</textarea></div>
                <div class="field"><label>Tarif</label><input id="e-tarif" value="${escapeHtml(item.tarif)}" /></div>
                <div class="field"><label>Responsable</label><input id="e-pers" value="${escapeHtml(item.personnes)}" /></div>
                <div class="actions">
                  <button class="btn btn-primary btn-small" type="button" data-save="${escapeHtml(item.id)}">Enregistrer</button>
                  <button class="btn btn-small" type="button" data-cancel>Annuler</button>
                </div>
              </div>
            </details>`;
        }

        const photosHtml = item.photos.length
          ? `<div class="field"><label>Photos</label><div class="photos">${item.photos
              .map((src, idx) => `
                <div class="photo-wrap">
                  <img src="${src}" alt="Photo" loading="lazy" />
                  <button class="photo-del" type="button" title="Supprimer la photo"
                    data-del-photo="${escapeHtml(item.id)}"
                    data-photo-url="${escapeHtml(item.photosOriginal[idx])}">×</button>
                </div>`)
              .join("")}</div></div>`
          : `<div class="field"><label>Photos</label><p>—</p></div>`;

        return `
          <details class="item ${item.prioritaire ? "prio" : ""}">
            <summary>
              <div class="title">${escapeHtml(item.titre)}</div>
              <span class="chevron">›</span>
              <div class="meta">
                <span class="tag ${statusClass(item.statut)}">${escapeHtml(item.statut)}</span>
                ${item.prioritaire ? '<span class="tag prio">Urgent</span>' : ""}
                <span class="date">${escapeHtml(formatDate(item.date))}</span>
              </div>
            </summary>
            <div class="content">
              <div class="field"><label>Notes</label><p>${escapeHtml(item.notes || "—")}</p></div>
              <div class="field"><label>Tarif</label><p>${escapeHtml(item.tarif || "—")}</p></div>
              <div class="field"><label>Responsable</label><p>${escapeHtml(item.personnes || "—")}</p></div>
              ${photosHtml}
              <div class="actions">
                <button class="btn btn-small" type="button" data-edit="${escapeHtml(item.id)}">Modifier</button>
                <button class="btn btn-small btn-danger" type="button" data-delete="${escapeHtml(item.id)}">Supprimer</button>
              </div>
              <p style="font-size:0.8rem;color:#888;margin:.5rem 0 0">Pour ajouter des photos : utilisez « Ajouter un travail » ou recréez l’entrée. La suppression retire la photo de la fiche.</p>
            </div>
          </details>`;
      }).join("");
    }

    async function loadTravaux() {
      statusEl.textContent = "Chargement…";
      try {
        const data = await apiJsonp({ action: "list" });
        allItems = (Array.isArray(data) ? data : []).map(normalizeBetter);
        editingId = null;
        render();
      } catch (e) {
        statusEl.textContent = "Erreur";
        listEl.innerHTML = '<div class="error">Impossible de charger les travaux.</div>';
      }
    }

    listEl.addEventListener("click", async (e) => {
      const editBtn = e.target.closest("[data-edit]");
      const delBtn = e.target.closest("[data-delete]");
      const saveBtn = e.target.closest("[data-save]");
      const cancelBtn = e.target.closest("[data-cancel]");
      const photoBtn = e.target.closest("[data-del-photo]");

      if (cancelBtn) {
        editingId = null;
        render();
        return;
      }

      if (editBtn) {
        editingId = editBtn.getAttribute("data-edit");
        render();
        return;
      }

      if (saveBtn) {
        if (!token()) return alert("Entrez le code PIN en haut de page");
        const id = saveBtn.getAttribute("data-save");
        statusEl.textContent = "Enregistrement…";
        const res = await apiJsonp({
          action: "update",
          token: token(),
          id,
          titre: document.getElementById("e-titre").value,
          statut: document.getElementById("e-statut").value,
          prioritaire: document.getElementById("e-prio").value,
          notes: document.getElementById("e-notes").value,
          tarif: document.getElementById("e-tarif").value,
          personnes: document.getElementById("e-pers").value,
        });
        if (!res.ok) return alert(res.error || "Erreur");
        await loadTravaux();
        return;
      }

      if (delBtn) {
        if (!token()) return alert("Entrez le code PIN en haut de page");
        if (!confirm("Supprimer ce travail ?")) return;
        const id = delBtn.getAttribute("data-delete");
        const res = await apiJsonp({ action: "delete", token: token(), id });
        if (!res.ok) return alert(res.error || "Erreur");
        await loadTravaux();
        return;
      }

      if (photoBtn) {
        if (!token()) return alert("Entrez le code PIN en haut de page");
        if (!confirm("Retirer cette photo de la fiche ?")) return;
        const id = photoBtn.getAttribute("data-del-photo");
        const photoUrl = photoBtn.getAttribute("data-photo-url");
        const res = await apiJsonp({
          action: "removePhoto",
          token: token(),
          id,
          photoUrl,
        });
        if (!res.ok) return alert(res.error || "Erreur");
        await loadTravaux();
      }
    });

    document.getElementById("filters").addEventListener("click", (e) => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
      btn.classList.add("active");
      render();
    });

    document.getElementById("btn-refresh").onclick = loadTravaux;
    loadTravaux();
  </script>
</body>
</html>
